methodology_summary: |
HireMind-AI is a next-gen candidate discovery and ranking system that aims to solve the limitations of existing ATS systems.
This system utilizes semantic search, behavioral intelligence, career context scoring, and LLM-based recruiter reasoning to find the most qualified candidates.

The pipeline can be broken down into the following steps:
(1) Semantic candidate-job matching using Sentence Transformers.
(2) Career context scoring considering experience, job title similarity, and career progression.
(3) Behavioral intelligence scoring based on recruiter response rate, profile activity, and other engagement factors.
(4) Behavioral anomaly detection to detect suspicious behavior or lack of engagement from a candidate.
(5) Hybrid scoring via the combination of semantic, behavioral, and career context scores.
(6) Top-K candidate extraction followed by recruiter re-ranking using Groq API.
(7) Explainable reasoning for recommendation generation.

